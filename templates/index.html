<!DOCTYPE html>
<html lang="en" data-skin="arcade" data-layout="column">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoSoLve</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}" type="image/png">
  <script src="{{ url_for('static', filename='vendor/tailwind-3.4.16.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layouts.css') }}">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div id="logo" aria-label="WoSolve"></div>
      <div id="mode-toggle" role="tablist">
        <button data-mode="solver" class="on" role="tab">Solver</button>
        <button data-mode="practice" role="tab">Practice</button>
      </div>
      <div id="top-actions">
        <button id="stats-btn" title="Stats">📊</button>
        <button id="help-btn" title="How to play">?</button>
        <button id="settings-btn" title="Settings">⚙</button>
      </div>
    </header>
    <main id="layout-root">
      <section id="board-zone"><div id="banner" hidden></div><div id="board"></div></section>
      <section id="suggest-slot"><div id="suggest-content"></div></section>
      <section id="keyboard-zone"><div id="keyboard"></div></section>
      <aside id="side-panel"><div id="side-suggest"></div><div id="stats-content"></div></aside>
      <div id="drawer" hidden>
        <div id="drawer-grip"></div>
        <nav id="drawer-tabs">
          <button data-tab="words" class="on">Words</button>
          <button data-tab="stats">Stats</button>
          <button data-tab="help">How to</button>
        </nav>
        <div id="drawer-body"></div>
      </div>
    </main>
  </div>
  <dialog id="settings-modal"></dialog>
  <dialog id="help-modal">
    <h3>How to play</h3>
    <p><b>Solver:</b> type your Wordle guess, then tap each tile to cycle its color
      (gray → yellow → green) to match what Wordle showed you. Press Enter — the word list
      narrows and the best next guess appears. Keys 1/2/3 also set colors.</p>
    <p><b>Practice:</b> the app picks a secret word; guess it in six tries.</p>
    <button class="close-modal">Close</button>
  </dialog>
  <img id="movingGif" class="moving-gif" src="{{ url_for('static', filename='images/dog.gif') }}" alt="">
  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
