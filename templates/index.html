<!DOCTYPE html>
<html lang="en" data-skin="arcade">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoSoLve</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}" type="image/png">
  <script src="{{ url_for('static', filename='vendor/tailwind-3.4.16.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layouts.css') }}">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div id="logo" aria-label="WoSolve"></div>
      <div id="mode-toggle" role="tablist">
        <button data-mode="solver" class="on" role="tab">Solver</button>
        <button data-mode="practice" role="tab">Practice</button>
      </div>
      <div id="top-actions">
        <button id="help-btn" title="How to play">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.2-3 4"/>
            <path d="M12 17.5h.01"/>
          </svg>
        </button>
        <button id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/>
          </svg>
        </button>
      </div>
    </header>
    <main id="layout-root">
      <aside id="panel-left">
        <div id="past-panel" class="panel">
          <h5 class="section-label">Past answers</h5>
          <div id="past-list" class="scroll-list"></div>
        </div>
        <div id="play-day" class="panel">
          <h5 class="section-label">Play a day</h5>
          <div id="play-day-calendar"></div>
          <h5 class="section-label recent-label">Recently played</h5>
          <div id="recent-list" class="scroll-list"></div>
        </div>
      </aside>
      <section id="center-col">
        <div id="banner" hidden></div>
        <div id="board"></div>
        <p id="practice-refresh-note" class="practice-refresh-note">Refresh the page for a new random word.</p>
        <div id="keyboard"></div>
      </section>
      <aside id="panel-right">
        <div id="side-suggest"></div>
        <div id="stats-content"></div>
      </aside>
    </main>
  </div>
  <dialog id="settings-modal">
    <div class="dialog-body">
    <h3>Settings</h3>
    <div class="set-group"><h5>Skin</h5>
      <div class="swatches" data-setting="skin" role="radiogroup" aria-label="Skin">
        <button data-value="board"><span class="sw sw-board"></span>Board</button>
        <button data-value="signal"><span class="sw sw-signal"></span>Signal</button>
        <button data-value="arcade"><span class="sw sw-arcade"></span>Arcade</button>
      </div></div>
    <div class="set-group"><h5>Theme</h5>
      <div class="swatches" data-setting="theme" role="radiogroup" aria-label="Theme">
        <button data-value="light">Light</button>
        <button data-value="dark">Dark</button>
        <button data-value="system">System</button>
      </div></div>
    <div class="set-group"><h5>Words</h5>
      <label class="set-check"><input type="checkbox" id="set-extended"><span class="checkbox-box" aria-hidden="true"></span> Include extended word list</label>
    </div>
    <button class="close-modal">Done</button>
    </div>
  </dialog>
  <dialog id="help-modal">
    <div class="dialog-body">
    <h3>How to play</h3>
    <div id="help-demo" class="help-demo">
      <div class="hd-stage" id="hd-stage"></div>
      <p class="hd-caption" id="hd-caption"></p>
      <div class="hd-dots" id="hd-dots"></div>
      <ol class="hd-static-captions" hidden></ol>
    </div>
    <button class="close-modal">Close</button>
    </div>
  </dialog>
  <dialog id="analysis-modal">
    <div class="dialog-body">
    <div id="analysis-content"></div>
    <button class="close-modal">Close</button>
    </div>
  </dialog>
  <img id="movingGif" class="moving-gif" src="{{ url_for('static', filename='images/dog.gif') }}" alt="">
  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
