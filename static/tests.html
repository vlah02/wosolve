<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>solver.js vs reference</title>
<style>body{font:14px monospace;padding:20px} .fail{color:#c00} .pass{color:#080}</style></head>
<body><h3>solver.js test vectors</h3><div id="out">loading…</div>
<script type="module">
import * as S from '/static/js/solver.js';
const out = document.getElementById('out');
const V = await (await fetch('/static/data/test-vectors.json')).json();
const ANSWERS = await (await fetch('/static/data/answers.json')).json();
const EXTENDED = await (await fetch('/static/data/extended.json')).json();
const FREQ = await (await fetch('/static/data/freq.json')).json();
const answerSet = new Set(ANSWERS);
let pass = 0; const fails = [];
const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);
for (const v of V.feedback) {
  const enc = [...v.guess].map((c, i) => c + S.feedback(v.answer, v.guess)[i]).join('');
  eq(enc, v.enc) ? pass++ : fails.push(`feedback ${v.answer}/${v.guess}: ${enc} != ${v.enc}`);
}
for (const [gi, g] of V.games.entries()) {
  const pool = g.list === 'both' ? ANSWERS.concat(EXTENDED) : ANSWERS;
  const st = S.stateFromRows(g.rows);
  const cands = S.filterWords(pool, st);
  const top = S.rankSuggestions(cands, answerSet, FREQ).slice(0, 3);
  eq(cands.length, g.count) && eq(cands.slice(0, 10), g.first) && eq(top, g.top)
    ? pass++ : fails.push(`game ${gi}: count ${cands.length}/${g.count} top ${top}/${g.top}`);
}
window.__results = { pass, fails };
out.innerHTML = fails.length
  ? `<p class="fail">${fails.length} FAILED (${pass} passed)</p>` + fails.map(f => `<div class="fail">${f}</div>`).join('')
  : `<p class="pass">ALL ${pass} PASS</p>`;
</script></body></html>
